user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # ✅ Kumpletong settings para sa VLESS/VMess/WS/GRPC
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;

    server {
        # ✅ Nakikinig sa PORT na binibigay ng Cloud Run (default 8080)
        listen 8080;
        listen [::]:8080;
        server_name _; # Tumatanggap ng lahat ng domain/IP

        # ✅ Normal na website / landing page
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ =404;
        }

        # ✅ Endpoint para sa config.json (maayos na path)
        location /config {
            default_type application/json;
            alias /app/config.json;
            try_files $uri =404;
        }

        # ✅ Halimbawa: VLESS WS endpoint (tanggalin ang # kung gagamitin)
        location /vless-ws {
            proxy_pass http://127.0.0.1:8080;
            proxy_redirect off;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
